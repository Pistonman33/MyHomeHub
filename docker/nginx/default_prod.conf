server {
    listen 80;
    server_name thiebault.be;

    root /var/www/static;
    index index.html;

    access_log /var/log/nginx/static_access.log;
    error_log /var/log/nginx/static_error.log warn;

    location / {
        try_files $uri $uri/ =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}

server {
    listen 80;
    server_name myhome.thiebault.be blog.thiebault.be media.thiebault.be;

    root /var/www/public;
    index index.php;

    access_log /var/log/nginx/laravel_access.log;
    error_log /var/log/nginx/laravel_error.log warn;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Laravel front controller
    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass myhomehub_laravel:9000;
        fastcgi_index index.php;

        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;

        fastcgi_read_timeout 60;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }

    # Static assets cache
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf)$ {
        expires 30d;
        access_log off;
    }
}