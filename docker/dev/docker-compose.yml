version: "3.9"

name: myhomehub-dev.

services:
  traefik:
    image: traefik:3.6.2
    container_name: myhomehub_traefik
    command:
      - "--configFile=/traefik/traefik.yml"
    ports:
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../traefik:/traefik

    labels:
      - "traefik.enable=true"

      # Dashboard router
      - "traefik.http.routers.traefik.rule=Host(`traefik.thiebault.test`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls=true"
      - "traefik.http.routers.traefik.service=api@internal"

    networks:
      - myhomehub_network
  nginx:
    image: nginx:stable-alpine
    container_name: myhomehub_nginx
    depends_on:
      - laravel
    volumes:
      - ../../laravel:/var/www:ro # For Laravel application code
      - ../../html:/var/www/static:ro # For static website html
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../nginx/logs:/var/log/nginx # For nginx logs
    labels:
      - "traefik.enable=true"

      # Laravel and subdomains
      - "traefik.http.routers.laravel.rule=Host(`myhome.thiebault.test`) || Host(`blog.thiebault.test`) || Host(`media.thiebault.test`)"
      - "traefik.http.routers.laravel.entrypoints=websecure"
      - "traefik.http.routers.laravel.tls=true"

      # Static site
      - "traefik.http.routers.static.rule=Host(`thiebault.test`)"
      - "traefik.http.routers.static.entrypoints=websecure"
      - "traefik.http.routers.static.tls=true"

    networks:
      - myhomehub_network

  laravel:
    build:
      context: ../
      dockerfile: laravel/Dockerfile
    container_name: myhomehub_laravel
    volumes:
      - ../../laravel:/var/www
      - ../../.env:/var/www/.env:ro
    depends_on:
      - mysql
    expose:
      - "9000"
    networks:
      - myhomehub_network
    command: php-fpm
  scheduler:
    build:
      context: ../
      dockerfile: laravel/Dockerfile
    container_name: myhomehub_scheduler
    volumes:
      - ../../laravel:/var/www
      - ../../.env:/var/www/.env:ro
    command: php artisan schedule:work >> /var/www/storage/logs/scheduler.log 2>&1
    networks:
      - myhomehub_network
  grpc-ctt:
    build:
      context: ../../
      dockerfile: docker/go/Dockerfile
      args:
        SERVICE: ctt
        PORT: 50051
    container_name: myhomehub_grpc-ctt
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - mysql
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50051"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - myhomehub_network
  grpc-video:
    build:
      context: ../../
      dockerfile: docker/go/Dockerfile
      args:
        SERVICE: video
        PORT: 50052
    container_name: myhomehub_grpc-video
    volumes:
      - ../../go/grpc/services/video/files:/app/files
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50052"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - myhomehub_network

  grpc-client:
    build:
      context: ../../go/grpc
      dockerfile: services/ctt/client/Dockerfile
    container_name: myhomehub_grpc-client
    depends_on:
      grpc-ctt:
        condition: service_healthy
    environment:
      - LICENSE_ID=167818
    networks:
      - myhomehub_network

  grpc-client-ctt-python:
    container_name: myhomehub_grpc-client-ctt-python
    build:
      context: ../../
      dockerfile: python/grpc/client/Dockerfile
    command: python client.py
    depends_on:
      grpc-ctt:
        condition: service_healthy
    environment:
      - LICENSE_ID=167818
    ports:
      - "2080:2080"
    networks:
      - myhomehub_network

  grpc-client-video-python:
    container_name: myhomehub_grpc-client-video-python
    build:
      context: ../../
      dockerfile: python/grpc/client/Dockerfile
    command: python video_client.py
    depends_on:
      grpc-video:
        condition: service_healthy
    environment:
      - VIDEO_SERVICE=grpc-video:50052
    ports:
      - "2081:2080"
    networks:
      - myhomehub_network

  video-gateway:
    build:
      context: ../../
      dockerfile: docker/go/Dockerfile
      args:
        SERVICE: video-gateway
        PORT: 8085
    container_name: myhomehub_video_gateway
    ports:
      - "8085:8085"
    depends_on:
      - grpc-video
    networks:
      - myhomehub_network
    labels:
      - "traefik.enable=true"

      # ROUTE PUBLIQUE
      - "traefik.http.routers.video.rule=Host(`stream.thiebault.test`)"
      - "traefik.http.routers.video.entrypoints=websecure"
      - "traefik.http.routers.video.tls=true"
      - "traefik.http.services.video.loadbalancer.server.port=8085"

  mysql:
    image: mysql:8.0
    container_name: myhomehub_mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${CONTAINER_MYSQL_ROOT_PASSWORD}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - ../mysql/data:/var/lib/mysql
      - ../mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    networks:
      - myhomehub_network

  grpcui:
    image: fullstorydev/grpcui
    container_name: myhomehub_grpc_doc
    depends_on:
      grpc-ctt:
        condition: service_healthy
    command:
      - "-plaintext"
      - "grpc-ctt:50051"
    labels:
      - "traefik.enable=true"

      # Route HTTPS
      - "traefik.http.routers.grpcui.rule=Host(`doc.thiebault.test`)"
      - "traefik.http.routers.grpcui.entrypoints=websecure"
      - "traefik.http.routers.grpcui.tls=true"
      - "traefik.http.services.grpcui.loadbalancer.server.port=8080"
    networks:
      - myhomehub_network

  mailhog:
    image: axllent/mailpit
    container_name: myhomehub_mailhog
    ports:
      - "8025:8025"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mailhog.rule=Host(`mailhog.thiebault.test`)"
      - "traefik.http.routers.mailhog.entrypoints=websecure"
      - "traefik.http.routers.mailhog.tls=true"
    networks:
      - myhomehub_network
  # “For production, I usually build assets beforehand using Vite and Tailwind, and only deploy the compiled files. Node is not required in the production container.”
  node:
    build:
      context: ../
      dockerfile: node/Dockerfile
    container_name: myhomehub_node
    volumes:
      - ../../laravel:/var/www
    ports:
      - "5173:5173"
    command: ["npm", "run", "dev"]
    networks:
      - myhomehub_network

networks:
  myhomehub_network:

volumes:
  mysql_data:
