name: myhomehub

services:
  traefik:
    image: traefik:3.0
    container_name: myhomehub_traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.email=webmaster@thiebault.be"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    networks:
      - myhomehub_network
    restart: unless-stopped

  nginx:
    image: ghcr.io/pistonman33/myhomehub-static:latest
    container_name: myhomehub_nginx
    depends_on:
      - laravel
    labels:
      - "traefik.enable=true"

      # Laravel
      - "traefik.http.routers.laravel.rule=Host(`myhome.thiebault.be`) || Host(`blog.thiebault.be`) || Host(`media.thiebault.be`)"
      - "traefik.http.routers.laravel.entrypoints=websecure"
      - "traefik.http.routers.laravel.tls.certresolver=le"

      # Static
      - "traefik.http.routers.static.rule=Host(`thiebault.be`)"
      - "traefik.http.routers.static.entrypoints=websecure"
      - "traefik.http.routers.static.tls.certresolver=le"
    networks:
      - myhomehub_network
    restart: unless-stopped

  laravel:
    image: ghcr.io/pistonman33/myhomehub:latest
    container_name: myhomehub_laravel
    volumes:
      - /var/www/myhomehub/storage/app/public:/var/www/storage/app/public
    expose:
      - "9000"
    env_file:
      - .env
    networks:
      - myhomehub_network
    restart: unless-stopped
    command: php-fpm

  scheduler:
    image: ghcr.io/pistonman33/myhomehub:latest
    container_name: myhomehub_scheduler
    command: php artisan schedule:work
    networks:
      - myhomehub_network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: myhomehub_mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${CONTAINER_MYSQL_ROOT_PASSWORD}
    # ON VPS HERE /var/lib/docker/volumes/myhomehub_mysql_data
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - myhomehub_network
    restart: unless-stopped

networks:
  myhomehub_network:

volumes:
  mysql_data:
  traefik_certs:
