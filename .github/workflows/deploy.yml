name: Build, Test & Deploy

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      deploy_only:
        description: "Skip build and tests and deploy only"
        required: false
        default: "false"

jobs:
  build:
    if: github.event.inputs.deploy_only != 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/pistonman33/myhomehub:latest \
            -f docker/laravel/Dockerfile.prod .

      - name: Push Docker image
        run: |
          docker push ghcr.io/pistonman33/myhomehub:latest

  tests:
    if: github.event.inputs.deploy_only != 'true'
    needs: build
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: myhomehub_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h mysql -uroot -proot --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CI image
        run: |
          docker build \
            -t myhomehub-ci \
            -f docker/laravel/Dockerfile.ci .

      - name: Run tests
        run: |
          docker run --rm \
            --network host \
            -w /var/www \
            -e DB_CONNECTION=mysql \
            -e DB_HOST=127.0.0.1 \
            -e DB_DATABASE=myhomehub_test \
            -e DB_USERNAME=root \
            -e DB_PASSWORD=root \
            myhomehub-ci \
            sh -c "
              php artisan config:clear &&
              php artisan migrate --force &&
              php artisan test
            "

  deploy:
    if: |
      always() &&
      (
        github.event.inputs.deploy_only == 'true' ||
        (needs.build.result == 'success' && needs.tests.result == 'success')
      )

    needs: [build, tests]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker/prod/docker-compose.yml"
          target: "/var/www/myhomehub/"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/myhomehub/docker/prod

            echo "Pull latest image"
            docker compose pull

            echo "Restart stack"
            docker compose up -d --remove-orphans

            echo "Cleanup"
            docker image prune -f
