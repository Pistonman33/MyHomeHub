name: Build, Test & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build \
          -t ghcr.io/pistonman33/myhomehub:latest \
          -f docker/laravel/Dockerfile.prod .

      - name: Push Docker image
        run: |
          docker push ghcr.io/pistonman33/myhomehub:latest

  tests:
    needs: build
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: myhomehub_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build CI image for tests
        run: |
          docker build \
            -t myhomehub-ci \
            -f docker/laravel/Dockerfile.ci .

      - name: Run tests
        run: |
          docker run --rm \
            --network host \
            -w /var/www \
            -e DB_HOST=127.0.0.1 \
            myhomehub-ci \
            sh -c "php artisan config:clear && php artisan migrate && php artisan test"

