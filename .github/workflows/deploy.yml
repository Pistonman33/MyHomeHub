name: Build, Test & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Laravel image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/laravel/Dockerfile.prod
          push: true
          tags: ghcr.io/pistonman33/myhomehub-laravel:latest

      - name: Build and push Static image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nginx/Dockerfile
          push: true
          tags: ghcr.io/pistonman33/myhomehub-static:latest

  tests:
    needs: build
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: myhomehub_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h mysql -uroot -proot --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CI image
        run: |
          docker build \
            -t myhomehub-ci \
            -f docker/laravel/Dockerfile.ci .

      - name: Run tests
        run: |
          docker run --rm \
            --network host \
            -w /var/www \
            -e DB_CONNECTION=mysql \
            -e DB_HOST=127.0.0.1 \
            -e DB_DATABASE=myhomehub_test \
            -e DB_USERNAME=root \
            -e DB_PASSWORD=root \
            myhomehub-ci \
            sh -c "
              php artisan config:clear &&
              php artisan migrate --force &&
              php artisan test
            "

  deploy:
    needs: [build, tests]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker/prod/docker-compose.yml"
          target: "/var/www/myhomehub/"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/myhomehub/docker/prod

            echo "Pull latest image"
            docker compose pull

            echo "Restart stack"
            docker compose up -d --remove-orphans

            echo "Cleanup"
            docker image prune -f
